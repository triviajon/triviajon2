---
layout: default
title: Productions
---

<h1>productions</h1>
<p>
  below is a list of all the theatrical productions i've been involved in. you
  can filter by role to quickly find relevant credits.
</p>

<div id="filters">
  <button class="active" onclick="filterProductions('all')">all</button>
  <button onclick="filterProductions('lights')">lights</button>
  <button onclick="filterProductions('cast')">cast</button>
  <button onclick="filterProductions('other')">other</button>
</div>

<div id="productions-grid">
  {% for p in productions %}
  <div class="production {{ p.categories | join: ' ' }}">
    <img src="{{ p.image }}" alt="{{ p.alt }}" loading="lazy" />
    <div class="production-text">
      <div class="title">{{ p.title }}</div>
      <div class="meta">
        <span class="year">{{ p.year }}</span>
        <span class="org">{{ p.org }}</span>
      </div>
      <div class="roles">{{ p.roles }}</div>
    </div>
  </div>
  {% endfor %}
</div>

<script>
  function filterProductions(category) {
    const productions = document.querySelectorAll(".production");
    productions.forEach((p) => {
      if (category === "all" || p.classList.contains(category)) {
        p.style.display = "";
      } else {
        p.style.display = "none";
      }
    });

    document.querySelectorAll("#filters button").forEach((btn) => {
      btn.classList.remove("active");
    });
    document
      .querySelector(`#filters button[onclick*="${category}"]`)
      .classList.add("active");
  }
</script>
